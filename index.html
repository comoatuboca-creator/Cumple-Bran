<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cuenta regresiva</title>

<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
}

h1{
    margin-top:30px;
    font-size:42px;
}

#contador{
    font-size:34px;
    color:#ff6700;
    margin:25px;
    font-weight:bold;
}

p{
    font-size:24px;
    padding:20px;
}
</style>
</head>

<body>

<h1>🎉 ¡Feliz Cumpleaños! 🎉</h1>

<div id="contador"></div>

<p>Hoy empieza tu sorpresa ❤️</p>

<script>

const fecha = new Date("2026-07-11T00:00:00");

const intervalo = setInterval(actualizar,1000);

function actualizar(){

    const ahora = new Date();
    const dif = fecha - ahora;

    if(dif <= 0){

        clearInterval(intervalo);

        document.getElementById("contador").innerHTML =
        "🎉 ¡Feliz cumpleaños, mi amor! ❤️<br><br>Espero que este sea un día inolvidable. Te amo con todo mi corazón. 🎂";

        return;
    }

    const dias = Math.floor(dif/86400000);
    const horas = Math.floor((dif%86400000)/3600000);
    const minutos = Math.floor((dif%3600000)/60000);
    const segundos = Math.floor((dif%60000)/1000);

    document.getElementById("contador").innerHTML =
        dias + " días " +
        horas + " hs " +
        minutos + " min " +
        segundos + " seg";
}

actualizar();

</script>

</body>
</html>
